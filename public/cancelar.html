<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>TrevoCode</title></head>
<body style="margin:0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
background:radial-gradient(800px 500px at 80% -10%,rgba(34,197,94,.18),transparent 60%),linear-gradient(160deg,#0A0F0D,#0E1613);color:#fff">
<div id="box" style="text-align:center;padding:40px 28px;max-width:440px"></div>
<script>
  var id = (new URLSearchParams(location.search).get('id') || '').replace(/[^a-zA-Z0-9_.-]/g,'');
  var FN = 'https://rgixjxmsdpugnkmplohb.supabase.co/functions/v1/cancel';
  var box = document.getElementById('box');
  function ask() {
    box.innerHTML =
      '<div style="font-size:56px;line-height:1">🍀</div>' +
      '<h1 style="font-size:26px;margin:14px 0 6px">Cancelar a publicação?</h1>' +
      '<p style="color:#9fb3a9;font-size:15px;margin:0 0 28px">Carrossel: <b style="color:#cfe9da">' + id + '</b></p>' +
      '<button id="btn" style="background:#ef4444;color:#fff;font-weight:800;font-size:19px;border:0;cursor:pointer;' +
      'padding:18px 34px;border-radius:16px;box-shadow:0 8px 24px rgba(239,68,68,.35)">🛑 Cancelar publicação</button>' +
      '<p style="color:#7d8f86;font-size:13px;margin-top:26px">Se abriu sem querer, é só fechar — nada acontece.</p>';
    document.getElementById('btn').onclick = doCancel;
  }
  async function doCancel() {
    box.innerHTML = '<p style="color:#9fb3a9">Cancelando…</p>';
    try { await fetch(FN + '?id=' + encodeURIComponent(id) + '&do=1', {mode:'no-cors'}); } catch (e) {}
    box.innerHTML =
      '<div style="font-size:64px;line-height:1">✅</div>' +
      '<h1 style="color:#22C55E;font-size:30px;margin:16px 0 8px">Post cancelado</h1>' +
      '<p style="color:#c9d6cf;font-size:17px">Esse carrossel <b>não vai ser publicado</b>. Pode ficar tranquilo.</p>';
  }
  if (!id) { box.innerHTML = '<p>Link inválido.</p>'; } else { ask(); }
</script>
</body></html>
